    type: postgres
    access: proxy
    url: postgres:5432
    user: netpulse
    secureJsonData:
      password: netpulse
    jsonData:
      database: netpulse
      sslmode: disable
      postgresVersion: 1600
      timescaledb: false
    isDefault: true
    editable: true
